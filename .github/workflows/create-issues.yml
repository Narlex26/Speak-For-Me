name: Create Labels for Issues

on:
  workflow_dispatch:

jobs:
  create-labels-and-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api repos/$REPO/labels --method POST -f name="must-have" -f color="0052cc" -f description="Must-have feature" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="nice-to-have" -f color="5319e7" -f description="Nice-to-have feature" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="✅-done" -f color="0e8a16" -f description="Feature completed" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="🔴-todo" -f color="d93f0b" -f description="Feature not started" 2>/dev/null || true
          echo "Labels created"

      - name: Assign labels to must-have done issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 8 9 10 11 12 13 14 15 16; do
            gh issue edit $num --repo $REPO --add-label "must-have,✅-done" || true
          done

      - name: Assign labels to must-have todo issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 17 18 19 20; do
            gh issue edit $num --repo $REPO --add-label "must-have,🔴-todo" || true
          done

      - name: Assign labels to nice-to-have done issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 22 25; do
            gh issue edit $num --repo $REPO --add-label "nice-to-have,✅-done" || true
          done

      - name: Assign labels to nice-to-have todo issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 21 23 24 26 27 28 29; do
            gh issue edit $num --repo $REPO --add-label "nice-to-have,🔴-todo" || true
          done

      - name: Close test issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue close 6 --repo $REPO --reason "not planned" 2>/dev/null || true
          gh issue close 7 --repo $REPO --reason "not planned" 2>/dev/null || true
          echo "Done"
