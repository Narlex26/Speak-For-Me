name: Create GitHub Issues and Labels

on:
  push:
    branches:
      - 'copilot/create-github-issues-features'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          create_label() {
            local name="$1" color="$2" desc="$3"
            gh api repos/$REPO/labels \
              --method POST \
              -f name="$name" \
              -f color="$color" \
              -f description="$desc" 2>/dev/null \
              || gh api repos/$REPO/labels/"$(python3 -c "import urllib.parse; print(urllib.parse.quote('$name'))")" \
                   --method PATCH \
                   -f color="$color" \
                   -f description="$desc" 2>/dev/null \
              || echo "Label '$name' already exists or error"
          }
          create_label "must-have" "0052cc" "Must-have feature"
          create_label "nice-to-have" "5319e7" "Nice-to-have feature"
          create_label "✅-done" "0e8a16" "Feature completed"
          create_label "🔴-todo" "d93f0b" "Feature not started"

      - name: Create issue 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create --repo $REPO \
            --title "Sélection du profil (Bébé, Chien, Chat, Poisson Rouge) avec animations" \
            --body "**Statut :** ✅ Terminé

**Catégorie :** Must-have

**Notes :** Implémentée et fonctionnelle." \
            --label "must-have" --label "✅-done"

      - name: Create issue 2
