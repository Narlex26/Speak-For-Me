name: Setup Issue Labels

on:
  workflow_dispatch:

jobs:
  create-labels-and-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Create the 4 project labels
          for label_def in \
            "must-have:0052cc:Must-have feature" \
            "nice-to-have:5319e7:Nice-to-have feature" \
            "✅-done:0e8a16:Feature completed" \
            "🔴-todo:d93f0b:Feature not started"; do
            name="${label_def%%:*}"
            rest="${label_def#*:}"
            color="${rest%%:*}"
            desc="${rest#*:}"
            gh api repos/$REPO/labels --method POST \
              -f name="$name" -f color="$color" -f description="$desc" 2>/dev/null || true
          done
          echo "Labels created"

      - name: Assign labels to must-have completed issues
        # Issues #8–16: must-have features that are done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 8 9 10 11 12 13 14 15 16; do
            gh issue edit $num --repo $REPO --add-label "must-have,✅-done" || true
          done

      - name: Assign labels to must-have todo issues
        # Issues #17–20: must-have features not yet started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 17 18 19 20; do
            gh issue edit $num --repo $REPO --add-label "must-have,🔴-todo" || true
          done

      - name: Assign labels to nice-to-have completed issues
        # Issues #22 and #25: nice-to-have features that are done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 22 25; do
            gh issue edit $num --repo $REPO --add-label "nice-to-have,✅-done" || true
          done

      - name: Assign labels to nice-to-have todo issues
        # Issues #21, #23, #24, #26–29: nice-to-have features not yet started
        # Note: #22 and #25 are excluded here as they are done (handled above)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for num in 21 23 24 26 27 28 29; do
            gh issue edit $num --repo $REPO --add-label "nice-to-have,��-todo" || true
          done

      - name: Close temporary test issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue close 6 --repo $REPO --reason "not planned" 2>/dev/null || true
          gh issue close 7 --repo $REPO --reason "not planned" 2>/dev/null || true
          echo "Done"
