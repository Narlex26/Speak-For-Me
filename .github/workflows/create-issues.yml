name: Create GitHub Issues and Labels

on:
  push:
    branches:
      - 'copilot/create-github-issues-features'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Create labels and issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Create labels (ignore errors if already exists)
          gh api repos/$REPO/labels --method POST -f name="must-have" -f color="0052cc" -f description="Must-have feature" 2>/dev/null || \
            gh api "repos/$REPO/labels/must-have" --method PATCH -f color="0052cc" -f description="Must-have feature" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="nice-to-have" -f color="5319e7" -f description="Nice-to-have feature" 2>/dev/null || \
            gh api "repos/$REPO/labels/nice-to-have" --method PATCH -f color="5319e7" -f description="Nice-to-have feature" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="✅-done" -f color="0e8a16" -f description="Feature completed" 2>/dev/null || \
            gh api "repos/$REPO/labels/%E2%9C%85-done" --method PATCH -f color="0e8a16" -f description="Feature completed" 2>/dev/null || true
          gh api repos/$REPO/labels --method POST -f name="🔴-todo" -f color="d93f0b" -f description="Feature not started" 2>/dev/null || \
            gh api "repos/$REPO/labels/%F0%9F%94%B4-todo" --method PATCH -f color="d93f0b" -f description="Feature not started" 2>/dev/null || true

          echo "Labels created."

          # Issue 1
          cat > /tmp/body1.md << 'BODYEOF'
          **Statut :** ✅ Terminé

          **Catégorie :** Must-have

          **Notes :** Implémentée et fonctionnelle.
          BODYEOF
          sed -i 's/^          //' /tmp/body1.md
          gh issue create --repo $REPO \
            --title "Sélection du profil (Bébé, Chien, Chat, Poisson Rouge) avec animations" \
            --body-file /tmp/body1.md \
            --label "must-have" --label "✅-done"

          # Issue 2
          cat > /tmp/body2.md << 'BODYEOF'
          **Statut :** ✅ Terminé

          **Catégorie :** Must-have
          BODYEOF
          sed -i 's/^          //' /tmp/body2.md
          gh issue create --repo $REPO \
            --title "Interface Material 3 avec dégradés et animations fluides" \
            --body-file /tmp/body2.md \
            --label "must-have" --label "✅-done"

          # Issue 3
          cat > /tmp/body3.md << 'BODYEOF'
          **Statut :** ✅ Terminé

